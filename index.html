<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
        
    </head>
    <body>
        <div class="background">
            <img src="/images/background2.jpg" class="background-img">
        </div>
        <div class="center">
            <div class="header">
                <img  class="header-img shadow" src="/images/makemytrip (2).jpg">
            </div>
            <div class="container">
                <div class="inner-container">
                    <label for="email" class="label-design">Email</label>
                    <input type="text" placeholder="Enter your Email" class="input-design">
                </div>
                <div class="inner-container">
                    <label for="password" class="label-design">Password</label>
                    <input type="text" placeholder="Enter your Password" class="input-design">
                </div>
                <input type="button" value="Login" class="button">
            </div>
        </div>
        
        
    </body>
</html>
