<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:wght@300&display=swap">
        
    </head>
    <body>
        
        <div class="center">
            <div class="container shadow">
                <div class="header">
                    <img  class="header-img" src="/images/makemytrip (2).jpg">
                </div>
                <div class="inner-container">
                    <label for="email" class="label-design">Email</label>
                    <input type="text" placeholder="Enter your Email" class="input-design inner-shadow">
                </div>
                <div class="inner-container">
                    <label for="password" class="label-design">Password</label>
                    <input type="text" placeholder="Enter your Password" class="input-design inner-shadow">
                </div>
                <input type="button" value="Login" class="button">
            </div>
        </div>
        
        
    </body>
</html>
