<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.1/css/all.css" crossorigin="anonymous">       
    </head>
    <body>
        <div class="root center">
            <div class="md:container md:mx-auto">
                <div class="justify-center item-center full-screen flex">
                    <div class="md:w-96">
                        <div class="login-box p-5">
                            <div class="company-logo flex items-center justify-center mt-4">
                                <img src="https://app.barbera.io/static/media/new-logo.358a4487.png">  
                            </div>
                            <form>
                                <div class="mt-5">
                                    <label for="email" class="font-size-16 tracking-normal mb-2 font-medium block modal-input-lable heading-title-text-color">Email</label>
                                    <input type="email" placeholder="Email" class="login-input w-full">
                                </div>
                                <div class="mt-5">
                                    <label for="password" class="font-size-16 tracking-normal mb-2 font-medium block modal-input-lable heading-title-text-color">Password</label>
                                    <input type="password" placeholder="Password" class="login-input w-full">
                                </div>
                                <div class="pt-8 mb-4">
                                    <input type="button" value="Login" class="font-size-16 w-full tracking-normal text-white font-medium cus-medium-btn">
                                </div>
                            </form>
                        </div>
                    </div>                    
                </div>   
             </div>
        </div>
