<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:wght@300&display=swap">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.1/css/all.css" crossorigin="anonymous">       
    </head>
    <body>
        
        <div class="center">
            <div class="container shadow">
                <div class="header">
                    <i class="fas fa-cut fa-2x header-img"></i>
                    <label for="title" class="header-font">barbera</label>   
                </div>
                <div class="inner-container">
                    <label for="email" class="label-design">Email</label>
                    <input type="email" placeholder="Enter your Email" class="input-design inner-shadow">
                </div>
                <div class="inner-container">
                    <label for="password" class="label-design">Password</label>
                    <input type="password" placeholder="Enter your Password" class="input-design inner-shadow">
                </div>
                <input type="button" value="Login" class="button">
            </div>
        </div>   
    </body>
</html>
